<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hospital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);">
  
  <!-- Switch Button para Staff -->
  <button id="btn-switch-staff" style="position: absolute; top: 20px; right: 20px; background: white; border: 1px solid #16a34a; color: #16a34a; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s;">
    🔒 Personal (Admin / Secretaría)
  </button>

  <div id="login-app" style="width: 100%; max-width: 400px; padding: 20px;">
    
    <!-- Portal del Paciente -->
    <div id="view-paciente" class="glass-card" style="text-align: center; border-top: 5px solid var(--primary-color);">
        <div style="font-size: 3rem; margin-bottom: 10px;">🩺</div>
        <h2 style="color: var(--primary-color); margin-bottom: 5px;">Portal del Paciente</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">Ingresa para gestionar tus citas médicas</p>
        
        <form id="form-paciente" style="text-align: left;">
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: 700; color: #334155;">Carnet de Identidad (C.I.)</label>
                <input type="text" id="ci_paciente" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px;" placeholder="Ej. 1234567" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-weight: 700; color: #334155;">Fecha de Nacimiento</label>
                <input type="date" id="fecha_nac_paciente" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px;" required>
            </div>
            
            <button type="submit" class="action-btn" style="width: 100%; font-size: 1.1rem; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer;">
                Ingresar
            </button>
        </form>
        <div id="msg-paciente" class="message" style="margin-top: 15px;"></div>
    </div>

    <!-- Acceso del Personal -->
    <div id="view-staff" class="glass-card" style="text-align: center; border-top: 5px solid #0f172a; display: none;">
        <div style="font-size: 3rem; margin-bottom: 10px;">🏥</div>
        <h2 style="color: #0f172a; margin-bottom: 5px;">Acceso del Personal</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">Administradores y Secretaría</p>
        
        <form id="form-staff" style="text-align: left;">
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: 700; color: #334155;">Usuario</label>
                <input type="text" id="username_staff" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px;" placeholder="Tu usuario" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-weight: 700; color: #334155;">Contraseña</label>
                <input type="password" id="password_staff" class="form-input" style="width: 100%; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px;" placeholder="********" required>
            </div>
            
            <button type="submit" class="action-btn" style="width: 100%; font-size: 1.1rem; padding: 12px; background: #0f172a; color: white; border: none; border-radius: 8px; cursor: pointer;">
                Iniciar Sesión
            </button>
        </form>
        <div id="msg-staff" class="message" style="margin-top: 15px;"></div>
    </div>

  </div>

  <script type="module" src="/login.js"></script>
</body>
</html>
